<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', 'Amiri', sans-serif;
      background: {{BACKGROUND_COLOR}};
      color: {{TEXT_COLOR}};
      padding: 20px;
      line-height: 1.8;
      direction: rtl;
    }
    .header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 2px solid #0f987f;
      margin-bottom: 30px;
    }
    .header .icon { font-size: 60px; margin-bottom: 10px; }
    .header h1 { font-size: 28px; color: #0f987f; }
    .header .subtitle { font-size: 16px; color: #888; margin-top: 8px; }
    .quick-info {
      display: flex; flex-wrap: wrap; gap: 12px;
      padding: 16px; margin-bottom: 24px;
      background: rgba(15, 152, 127, 0.1);
      border-radius: 12px;
    }
    .quick-info .item { flex: 1; min-width: 120px; text-align: center; }
    .quick-info .label { font-size: 12px; color: #888; }
    .quick-info .value { font-size: 14px; font-weight: bold; }
    .toc {
      padding: 16px; margin-bottom: 24px;
      background: rgba(15, 152, 127, 0.06);
      border-radius: 12px;
    }
    .toc h2 { font-size: 18px; margin-bottom: 12px; color: #0f987f; }
    .toc a {
      display: block; padding: 8px 0;
      color: inherit; text-decoration: none;
      border-bottom: 1px solid rgba(128,128,128,0.15);
    }
    .section { margin-bottom: 32px; }
    .section h2 {
      font-size: 22px; color: #0f987f;
      margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(15,152,127,0.3);
    }
    .section p { margin-bottom: 16px; font-size: 16px; }
    .quran-quote {
      background: rgba(15, 152, 127, 0.08);
      border-right: 4px solid #0f987f;
      padding: 16px 20px;
      margin: 16px 0;
      border-radius: 0 12px 12px 0;
      font-family: 'Amiri', serif;
      font-size: 20px;
      line-height: 2;
      text-align: center;
    }
    .quran-reference {
      text-align: center; font-size: 14px;
      color: #0f987f; margin-top: 8px;
    }
    .lessons {
      background: rgba(15, 152, 127, 0.05);
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
    }
    .lessons h3 { color: #0f987f; margin-bottom: 12px; font-size: 18px; }
    .lessons ul { list-style: none; padding: 0; }
    .lessons li {
      padding: 8px 0;
      border-bottom: 1px solid rgba(128,128,128,0.1);
      position: relative;
      padding-right: 20px;
    }
    .lessons li::before {
      content: '•'; position: absolute;
      right: 0; color: #0f987f;
    }
    .footer {
      text-align: center; padding: 24px 0; margin-top: 32px;
      border-top: 2px solid #0f987f; color: #888;
    }
    .footer .app-name { font-size: 18px; color: #0f987f; margin-bottom: 4px; }
  </style>
</head>
<body>
  {{CONTENT}}
  <div class="footer">
    <div class="app-name">روح المسلم</div>
    <div>Ruh Al-Muslim</div>
  </div>
</body>
</html>
