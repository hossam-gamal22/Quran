name: Daily Video Generator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: daily-video
  cancel-in-progress: false

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        working-directory: scripts
        run: npm install --production

      - name: Generate videos
        working-directory: scripts
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          echo "🔑 PEXELS_API_KEY length: ${#PEXELS_API_KEY}"
          echo "📂 Font file: $(ls -la fonts/KFGQPC-Uthmanic-Script.ttf 2>&1)"
          echo "🔧 FFmpeg: $(ffmpeg -version | head -1)"
          node generate-daily-video.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "Update daily content & cleanup [skip ci]"
            git pull --rebase origin main
            git push origin main
          }
