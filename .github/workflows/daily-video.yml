name: Daily Video Generator

on:
  schedule:
    - cron: '0 0 * * *' # بيشتغل كل يوم الساعة 12 بالليل
  workflow_dispatch: # عشان تقدر تشغله يدوي للتجربة

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm install axios fluent-ffmpeg @supabase/supabase-js

      - name: Run video generator
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node scripts/generate-daily-video.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/today-video.mp4 data/daily-video.json
          git commit -m "Update daily video [skip ci]" || echo "No changes to commit"
          git push
