<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- 3D Kaaba: Isometric style, top at y=10, centered horizontally -->
  <!-- Top face -->
  <polygon points="150,30 190,50 150,70 110,50" fill="#222"/>
  <!-- Left face -->
  <polygon points="110,50 150,70 150,130 110,110" fill="#181818"/>
  <!-- Right face -->
  <polygon points="150,70 190,50 190,110 150,130" fill="#111"/>
  <!-- Gold Kiswah band (wraps around front and right) -->
  <polygon points="150,70 190,50 190,60 150,80" fill="#FFD700"/>
  <polygon points="150,70 150,80 110,60 110,50" fill="#FFD700"/>
  <!-- Front face (with subtle shadow) -->
  <polygon points="110,50 150,70 150,130 110,110" fill="#222" opacity="0.85"/>
  <!-- Right face (with subtle highlight) -->
  <polygon points="150,70 190,50 190,110 150,130" fill="#181818" opacity="0.92"/>
  <!-- Base shadow -->
  <ellipse cx="150" cy="135" rx="42" ry="8" fill="#000" opacity="0.18"/>
</svg>