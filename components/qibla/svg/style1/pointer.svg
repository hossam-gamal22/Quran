<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Center pivot point indicator -->
  <circle cx="150" cy="150" r="10" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="150" cy="150" r="4" fill="#1ED760"/>
  <!-- Connecting Line from center to Kaaba -->
  <line x1="150" y1="150" x2="150" y2="55" stroke="#1ED760" stroke-width="4" stroke-dasharray="8 4"/>
  <!-- Simple Arrow Head -->
  <polygon points="150,45 140,65 160,65" fill="#1ED760" />
</svg>